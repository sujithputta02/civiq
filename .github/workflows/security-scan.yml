name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-check:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run npm audit and check severity
        run: |
          # Run audit and capture output (don't fail on exit code)
          npm audit --json > audit-report.json || true
          
          # Parse vulnerability counts
          CRITICAL=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          MODERATE=$(cat audit-report.json | jq '.metadata.vulnerabilities.moderate // 0')
          LOW=$(cat audit-report.json | jq '.metadata.vulnerabilities.low // 0')
          
          echo "📊 Security Audit Results:"
          echo "  Critical: $CRITICAL"
          echo "  High: $HIGH"
          echo "  Moderate: $MODERATE"
          echo "  Low: $LOW"
          echo ""
          
          # Only fail on critical or high vulnerabilities
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL critical vulnerabilities - FAILING BUILD"
            npm audit --audit-level=critical
            exit 1
          fi
          
          if [ "$HIGH" -gt 0 ]; then
            echo "❌ Found $HIGH high vulnerabilities - FAILING BUILD"
            npm audit --audit-level=high
            exit 1
          fi
          
          if [ "$MODERATE" -gt 0 ]; then
            echo "⚠️  Found $MODERATE moderate vulnerabilities (not failing build)"
            echo "Note: Moderate vulnerabilities in transitive dependencies are tracked"
          fi
          
          echo "✅ No critical or high vulnerabilities found - BUILD PASSING"

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  sast:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint security checks
        run: npm run lint
        continue-on-error: true

      - name: Run TypeScript strict checks
        run: npm run typecheck

      - name: Check for console statements in production code
        run: |
          CONSOLE_LOGS=$(grep -r "console\." apps/api/src --include="*.ts" --exclude-dir=__tests__ | grep -v "eslint-disable" | wc -l)
          if [ "$CONSOLE_LOGS" -gt 0 ]; then
            echo "⚠️ Found $CONSOLE_LOGS console statements in production code"
            grep -r "console\." apps/api/src --include="*.ts" --exclude-dir=__tests__ | grep -v "eslint-disable"
          fi

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for security headers in code
        run: |
          echo "Checking for security headers implementation..."
          grep -r "X-Frame-Options" apps/api/src --include="*.ts" || echo "⚠️ X-Frame-Options not found"
          grep -r "X-Content-Type-Options" apps/api/src --include="*.ts" || echo "⚠️ X-Content-Type-Options not found"
          grep -r "Content-Security-Policy" apps/api/src --include="*.ts" || echo "⚠️ CSP not found"
          grep -r "Strict-Transport-Security" apps/api/src --include="*.ts" || echo "⚠️ HSTS not found"

  audit-logging:
    name: Audit Logging Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify audit logging implementation
        run: |
          echo "Checking for audit logging..."
          if [ -f "apps/api/src/modules/security/audit.service.ts" ]; then
            echo "✅ Audit service found"
          else
            echo "❌ Audit service not found"
            exit 1
          fi

          if grep -r "logAuditEvent\|logAuthEvent\|logAdminAction" apps/api/src --include="*.ts" | grep -q "import"; then
            echo "✅ Audit logging is being used"
          else
            echo "⚠️ Audit logging may not be fully integrated"
          fi

  rbac-check:
    name: RBAC Implementation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify RBAC implementation
        run: |
          echo "Checking for RBAC implementation..."
          if [ -f "apps/api/src/middleware/rbac.ts" ]; then
            echo "✅ RBAC middleware found"
          else
            echo "❌ RBAC middleware not found"
            exit 1
          fi

          if grep -r "requireRole\|requireAdmin\|requireModerator" apps/api/src --include="*.ts" | grep -q "import"; then
            echo "✅ RBAC is being used"
          else
            echo "⚠️ RBAC may not be fully integrated"
          fi

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      [dependency-check, secret-scan, sast, codeql, security-headers, audit-logging, rbac-check]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "🔒 Security Scan Summary"
          echo "========================"
          echo "✅ All security checks completed"
          echo ""
          echo "Checks performed:"
          echo "  ✓ Dependency vulnerability scanning"
          echo "  ✓ Secret scanning"
          echo "  ✓ Static application security testing"
          echo "  ✓ CodeQL analysis"
          echo "  ✓ Security headers verification"
          echo "  ✓ Audit logging verification"
          echo "  ✓ RBAC implementation verification"
